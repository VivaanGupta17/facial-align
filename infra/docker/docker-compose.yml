version: "3.9"

# Facial Align — Development Docker Compose
# Usage: docker compose -f infra/docker/docker-compose.yml up -d

services:
  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fa-postgres
    environment:
      POSTGRES_DB: facial_align
      POSTGRES_USER: facial_align
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U facial_align"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fa-network

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: fa-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fa-network

  # ── MinIO (S3-compatible object storage) ─────────────────────
  minio:
    image: minio/minio:latest
    container_name: fa-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - fa-network

  # ── MinIO bucket initialization ──────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: fa-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set fa http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing fa/dicom-studies;
      mc mb --ignore-existing fa/mesh-assets;
      mc mb --ignore-existing fa/model-registry;
      mc mb --ignore-existing fa/segmentation-masks;
      mc mb --ignore-existing fa/planning-artifacts;
      echo 'Buckets created successfully';
      "
    networks:
      - fa-network

  # ── Backend API ──────────────────────────────────────────────
  backend:
    build:
      context: ../../
      dockerfile: apps/backend/Dockerfile
    container_name: fa-backend
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://facial_align:${POSTGRES_PASSWORD:-password}@postgres:5432/facial_align
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - INFERENCE_DEVICE=${INFERENCE_DEVICE:-cpu}
    ports:
      - "8000:8000"
    volumes:
      - ../../apps/backend:/app
      - model_cache:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - fa-network
    # Uncomment for GPU access:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Celery Worker ────────────────────────────────────────────
  celery-worker:
    build:
      context: ../../
      dockerfile: apps/backend/Dockerfile
    container_name: fa-celery-worker
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=postgresql+asyncpg://facial_align:${POSTGRES_PASSWORD:-password}@postgres:5432/facial_align
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - INFERENCE_DEVICE=${INFERENCE_DEVICE:-cpu}
    volumes:
      - ../../apps/backend:/app
      - model_cache:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fa-network
    # Uncomment for GPU access:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
    container_name: fa-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ../../apps/frontend/src:/app/src
    depends_on:
      - backend
    networks:
      - fa-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  model_cache:

networks:
  fa-network:
    driver: bridge
