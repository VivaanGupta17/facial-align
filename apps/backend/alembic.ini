# Alembic configuration file for Facial Align backend.
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to the migration scripts directory (relative to this file's location)
script_location = alembic

# Template string for migration script filenames.
# %(rev)s  – revision identifier
# %(slug)s – truncated revision message
# %(year)d, %(month).2d, %(day).2d, %(hour).2d, %(minute).2d, %(second).2d
file_template = %%(rev)s_%%(slug)s

# Truncation length for the %(slug)s token in file_template
truncate_slug_length = 40

# sys.path manipulation to locate app package
prepend_sys_path = .

# Timezone for revision creation timestamps
timezone = UTC

# Maximum line length for alembic output
output_encoding = utf-8

# The database URL is resolved at runtime from app settings to avoid
# storing credentials in this file. The env.py reads from AppSettings.
# For CLI usage, set the DATABASE_URL environment variable or configure
# settings via .env:
#   postgresql+asyncpg://user:password@host:5432/dbname
#
# sqlalchemy.url is NOT set here — env.py supplies it dynamically.

# Post-write hooks: auto-format generated migration files with black
# Uncomment if black is installed in the environment:
# [post_write_hooks]
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
