name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ── Backend Tests ──────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        working-directory: apps/backend
        run: |
          pip install ruff mypy
          pip install -e ".[dev]"
      - name: Ruff lint
        working-directory: apps/backend
        run: ruff check .
      - name: Ruff format check
        working-directory: apps/backend
        run: ruff format --check .
      - name: Type check
        working-directory: apps/backend
        run: mypy app/ --ignore-missing-imports

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: facial_align_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        working-directory: apps/backend
        run: pip install -e ".[dev]"
      - name: Run tests
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/facial_align_test
          REDIS_URL: redis://localhost:6379/0
          INFERENCE_DEVICE: cpu
        run: pytest tests/ -v --tb=short -x

  # ── Frontend Tests ─────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        working-directory: apps/frontend
        run: npm ci
      - name: TypeScript check
        working-directory: apps/frontend
        run: npx tsc --noEmit
      - name: ESLint
        working-directory: apps/frontend
        run: npx eslint src/ --ext .ts,.tsx

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        working-directory: apps/frontend
        run: npm ci
      - name: Build
        working-directory: apps/frontend
        run: npm run build

  # ── Docker Build ───────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t facial-align-backend -f apps/backend/Dockerfile .
      - name: Build frontend image
        run: docker build -t facial-align-frontend -f apps/frontend/Dockerfile apps/frontend/

  # ── Pipeline Tests ─────────────────────────────────────────
  pipeline-test:
    name: Pipeline Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        working-directory: apps/backend
        run: pip install -e ".[dev]"
      - name: Run pipeline tests
        env:
          INFERENCE_DEVICE: cpu
        run: pytest tests/unit/pipelines/ -v --tb=short
